name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: '1.26.1'

jobs:
  # Fast checks first - fail fast
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.2

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files need formatting:"
            gofmt -l .
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: go build -v ./...

      - name: Build binaries
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o ./bin/app ./cmd/app
          CGO_ENABLED=0 go build -ldflags="-s -w" -o ./bin/worker ./cmd/worker

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: |
          EXCLUDE='internal/app$|pkg/postgres$|pkg/redis$'
          EXCLUDE="$EXCLUDE|pkg/asynq|pkg/telemetry"
          EXCLUDE="$EXCLUDE|pkg/codegen/cmd|pkg/tools"
          EXCLUDE="$EXCLUDE|pkg/logger$|storage/"
          EXCLUDE="$EXCLUDE|internal/handlers/http$"
          EXCLUDE="$EXCLUDE|internal/worker$"
          EXCLUDE="$EXCLUDE|webapi/email$|pkg/audit$"
          PKGS=$(go list ./internal/... ./pkg/... \
            | grep -v -E "($EXCLUDE)" \
            | tr '\n' ',' | sed 's/,$//')
          go test -v -race -covermode=atomic \
            -coverprofile=coverage.txt \
            -coverpkg="$PKGS" \
            ./internal/... ./pkg/...

      - name: Check coverage threshold
        run: |
          coverage=$(go tool cover -func=coverage.txt | grep total: | awk '{print int($3)}')
          echo "Total coverage: ${coverage}%"
          if [ "${coverage}" -lt "85" ]; then
            echo "::error::Coverage ${coverage}% is below 85% threshold"
            exit 1
          fi
          echo "Coverage meets 85% threshold"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.txt
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run nancy (dependency check)
        run: |
          go list -json -m all > go.list
          curl -sSL https://github.com/sonatype-nexus-community/nancy/releases/latest/download/nancy-linux-amd64 -o nancy
          chmod +x nancy
          ./nancy sleuth < go.list || true

  # Config file linters (non-blocking)
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't block CI on YAML lint
    steps:
      - uses: actions/checkout@v6

      - name: yaml-lint
        uses: ibiqlik/action-yamllint@v3
        with:
          # Only lint config files, exclude auto-generated swagger
          file_or_dir: |
            .github/
            deployment/
            config/
          config_data: |
            extends: default
            rules:
              truthy: disable
              document-start: disable
              line-length:
                max: 150
              indentation:
                spaces: 2
                indent-sequences: consistent

  docker-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't block CI on Dockerfile lint
    steps:
      - uses: actions/checkout@v6

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: deployment/docker/Dockerfile
          failure-threshold: warning

  # Integration tests (only on PR, requires services)
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [lint, build, test]
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run migrations
        env:
          POSTGRES_URL: postgres://postgres:postgres@localhost:5432/test_db?sslmode=disable
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate -path migrations -database "$POSTGRES_URL" up

      - name: Build and start app
        env:
          APP_ENV: development
          HTTP_PORT: "8080"
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DBNAME: test_db
          POSTGRES_SSLMODE: disable
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          JWT_SECRET_KEY: integration-test-secret-key
          STORAGE_DRIVER: local
          STORAGE_LOCAL_PATH: /tmp/uploads
          STORAGE_LOCAL_URL: http://localhost:8080/uploads
        run: |
          CGO_ENABLED=0 go build -o ./bin/app ./cmd/app
          mkdir -p /tmp/uploads
          ./bin/app &
          echo $! > /tmp/app.pid
          # Wait for app to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/healthz > /dev/null 2>&1; then
              echo "App is ready"
              break
            fi
            echo "Waiting for app... ($i/30)"
            sleep 1
          done

      - name: Run integration tests
        env:
          APP_HOST: localhost
          APP_PORT: "8080"
        run: go test -v ./integration-test/...

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/app.pid ]; then
            kill "$(cat /tmp/app.pid)" 2>/dev/null || true
          fi

  # Final status check for branch protection
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, format, build, test, security]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.format.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required jobs passed!"
