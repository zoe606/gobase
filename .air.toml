# Air configuration for live reload development (Windows compatible)
# https://github.com/air-verse/air

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Build arguments passed to the binary
  args_bin = ["-config", "./config/config.yaml"]
  
  # Binary output (Windows needs .exe)
  bin = "./tmp/main"

  # Build command
  cmd = "go build -o ./tmp/main ./cmd/app"
  
  # Build delay after file change (ms)
  delay = 1000
  
  # Directories to exclude from watching
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "node_modules", ".git"]
  
  # Files to exclude
  exclude_file = []
  
  # Regex for excluding files
  exclude_regex = ["_test.go", "_mock.go"]
  
  # Exclude unchanged files
  exclude_unchanged = false
  
  # Follow symlinks
  follow_symlink = false
  
  # Full binary path
  full_bin = ""
  
  # File extensions to watch
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "toml", "json"]
  
  # Additional directories to watch
  include_dir = []
  
  # Additional files to watch
  include_file = []
  
  # Kill delay
  kill_delay = "0s"
  
  # Log output
  log = "build-errors.log"
  
  # Enable polling (useful for Docker/WSL)
  poll = false
  
  # Polling interval (ms)
  poll_interval = 0
  
  # Rerun binary
  rerun = false
  
  # Rerun delay (ms)
  rerun_delay = 500
  
  # Send interrupt signal before killing
  send_interrupt = true
  
  # Stop running on build error
  stop_on_error = false

[color]
  app = "green"
  build = "yellow"
  main = "magenta"
  runner = "cyan"
  watcher = "blue"

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = true
  keep_scroll = true
