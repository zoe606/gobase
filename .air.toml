# Air configuration for live reload development (Windows compatible)
# https://github.com/air-verse/air

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Build command
  cmd = "go build -o ./tmp/main.exe ./cmd/app"

  # Binary output
  bin = "./tmp/main.exe"

  # Build arguments passed to the binary
  args_bin = ["-config", "./config/config.yaml"]

  # IMPORTANT: Only watch these specific directories (not the whole system!)
  include_dir = ["cmd", "config", "internal", "pkg"]

  # File extensions to watch
  include_ext = ["go", "yaml", "yml"]

  # Directories to exclude
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "node_modules", ".git", ".idea", ".vscode", "integration-test", "docs", "scripts"]

  # Regex for excluding files
  exclude_regex = ["_test.go", "_mock.go"]

  # Build delay after file change (ms)
  delay = 1000

  # Send interrupt signal before killing
  send_interrupt = true

  # Stop running on build error
  stop_on_error = false

  # Log output
  log = "build-errors.log"

[color]
  app = "green"
  build = "yellow"
  main = "magenta"
  runner = "cyan"
  watcher = "blue"

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = true
  keep_scroll = true
