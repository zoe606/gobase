info:
  contact: {}
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and get tokens
      operationId: auth-login
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-boilerplate_internal_dto_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.Response-go-boilerplate_internal_dto_auth_LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Invalidate refresh token
      operationId: auth-logout
      parameters:
      - description: Refresh token to invalidate
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-boilerplate_internal_dto_auth.RefreshRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /auth/me:
    get:
      description: Get currently authenticated user info
      operationId: auth-me
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.Response-go-boilerplate_internal_dto_auth_UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh access token using refresh token
      operationId: auth-refresh
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-boilerplate_internal_dto_auth.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.Response-go-boilerplate_internal_dto_auth_TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
      summary: Refresh tokens
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user account
      operationId: auth-register
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-boilerplate_internal_dto_auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.Response-go-boilerplate_internal_dto_auth_LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /config:
    get:
      description: Returns sanitized application configuration (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.Response-internal_handlers_http_v1_config_ConfigResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get application configuration
      tags:
      - config
  /config/cache/invalidate:
    post:
      description: Clears the cached configuration (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.Response-map_string_string'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Invalidate config cache
      tags:
      - config
  /media:
    get:
      description: Returns all media items for an attachable entity
      parameters:
      - description: Entity type (e.g., users, posts)
        in: query
        name: attachable_type
        required: true
        type: string
      - description: Entity ID
        in: query
        name: attachable_id
        required: true
        type: integer
      - description: Collection name
        in: query
        name: collection
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.Response-go-boilerplate_internal_dto_media_MediaListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get media by attachable
      tags:
      - media
  /media/{id}:
    delete:
      description: Deletes a media item and its associated files
      parameters:
      - description: Media ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.Response-map_string_string'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete media
      tags:
      - media
    get:
      description: Returns a media item by its ID
      parameters:
      - description: Media ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.Response-go-boilerplate_internal_dto_media_MediaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get media by ID
      tags:
      - media
  /media/{id}/url:
    get:
      description: Returns a signed URL to access the media file
      parameters:
      - description: Media ID
        in: path
        name: id
        required: true
        type: integer
      - description: Variant name (e.g., thumb, medium, large)
        in: query
        name: variant
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.Response-map_string_string'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get media URL
      tags:
      - media
  /media/presigned-url:
    post:
      consumes:
      - application/json
      description: Returns a presigned URL for direct client-to-storage upload
      parameters:
      - description: Request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-boilerplate_internal_dto_media.PresignedURLRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.Response-go-boilerplate_internal_dto_media_PresignedURLResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get presigned upload URL
      tags:
      - media
  /media/upload:
    post:
      consumes:
      - multipart/form-data
      description: Uploads a file and attaches it to an entity
      parameters:
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      - description: Entity type (e.g., users, posts)
        in: formData
        name: attachable_type
        required: true
        type: string
      - description: Entity ID
        in: formData
        name: attachable_id
        required: true
        type: integer
      - description: Collection name (e.g., avatar, gallery)
        in: formData
        name: collection
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.Response-go-boilerplate_internal_dto_media_MediaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload a file
      tags:
      - media
  /translation/do-translate:
    post:
      consumes:
      - application/json
      description: Translate a text
      operationId: do-translate
      parameters:
      - description: Set up translation
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-boilerplate_internal_dto_translation.TranslateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.Response-go-boilerplate_internal_dto_translation_TranslationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-boilerplate_pkg_response.ErrorResponse'
      summary: Translate
      tags:
      - translation
  /translation/history:
    get:
      consumes:
      - application/json
      description: Show all translation history with pagination
      operationId: history
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      - description: Sort field
        enum:
        - created_at
        - id
        in: query
