definitions:
  go-boilerplate_internal_dto_auth.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: password123
        type: string
    required:
    - email
    - password
    type: object
  go-boilerplate_internal_dto_auth.LoginResponse:
    properties:
      access_token:
        type: string
      expires_at:
        type: integer
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/go-boilerplate_internal_dto_auth.UserResponse'
    type: object
  go-boilerplate_internal_dto_auth.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  go-boilerplate_internal_dto_auth.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      name:
        example: John Doe
        minLength: 2
        type: string
      password:
        example: password123
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  go-boilerplate_internal_dto_auth.TokenResponse:
    properties:
      access_token:
        type: string
      expires_at:
        type: integer
      refresh_token:
        type: string
    type: object
  go-boilerplate_internal_dto_auth.UserResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      role:
        type: string
    type: object
  go-boilerplate_internal_dto_media.MediaListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/go-boilerplate_internal_dto_media.MediaResponse'
        type: array
      total:
        type: integer
    type: object
  go-boilerplate_internal_dto_media.MediaResponse:
    properties:
      attachable_id:
        type: integer
      attachable_type:
        type: string
      collection:
        type: string
      created_at:
        type: string
      filename:
        type: string
      height:
        type: integer
      id:
        type: integer
      mime_type:
        type: string
      original_name:
        type: string
      size:
        type: integer
      type:
        $ref: '#/definitions/go-boilerplate_internal_entity.MediaType'
      url:
        type: string
      variants:
        additionalProperties: true
        type: object
      width:
        type: integer
    type: object
  go-boilerplate_internal_dto_media.PresignedURLRequest:
    properties:
      filename:
        type: string
    required:
    - filename
    type: object
  go-boilerplate_internal_dto_media.PresignedURLResponse:
    properties:
      expires_in:
        description: seconds
        type: integer
      path:
        type: string
      upload_url:
        type: string
    type: object
  go-boilerplate_internal_dto_translation.TranslateRequest:
    properties:
      destination:
        example: en
        type: string
      original:
        example: text to translate
        type: string
      source:
        example: auto
        type: string
    required:
    - destination
    - original
    - source
    type: object
  go-boilerplate_internal_dto_translation.TranslationResponse:
    properties:
      destination:
        type: string
      id:
        type: integer
      original:
        type: string
      source:
        type: string
      translation:
        type: string
    type: object
  go-boilerplate_internal_entity.MediaType:
    enum:
    - image
    - document
    - video
    - audio
    - other
    type: string
    x-enum-varnames:
    - MediaTypeImage
    - MediaTypeDocument
    - MediaTypeVideo
    - MediaTypeAudio
    - MediaTypeOther
  go-boilerplate_pkg_response.ErrorDetail:
    properties:
      code:
        type: string
      details:
        additionalProperties:
          type: string
        type: object
      message:
        type: string
    type: object
  go-boilerplate_pkg_response.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/go-boilerplate_pkg_response.ErrorDetail'
      request_id:
        type: string
      success:
        type: boolean
    type: object
  go-boilerplate_pkg_response.Meta:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  go-boilerplate_pkg_response.Response-array_go-boilerplate_internal_dto_translation_TranslationResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/go-boilerplate_internal_dto_translation.TranslationResponse'
        type: array
      meta:
        $ref: '#/definitions/go-boilerplate_pkg_response.Meta'
      request_id:
        type: string
      success:
        type: boolean
    type: object
  go-boilerplate_pkg_response.Response-go-boilerplate_internal_dto_auth_LoginResponse:
    properties:
      data:
        $ref: '#/definitions/go-boilerplate_internal_dto_auth.LoginResponse'
      meta:
        $ref: '#/definitions/go-boilerplate_pkg_response.Meta'
      request_id:
        type: string
      success:
        type: boolean
    type: object
  go-boilerplate_pkg_response.Response-go-boilerplate_internal_dto_auth_TokenResponse:
    properties:
      data:
        $ref: '#/definitions/go-boilerplate_internal_dto_auth.TokenResponse'
      meta:
        $ref: '#/definitions/go-boilerplate_pkg_response.Meta'
      request_id:
        type: string
      success:
        type: boolean
    type: object
  go-boilerplate_pkg_response.Response-go-boilerplate_internal_dto_auth_UserResponse:
    properties:
      data:
        $ref: '#/definitions/go-boilerplate_internal_dto_auth.UserResponse'
      meta:
        $ref: '#/definitions/go-boilerplate_pkg_response.Meta'
      request_id:
        type: string
      success:
        type: boolean
    type: object
  go-boilerplate_pkg_response.Response-go-boilerplate_internal_dto_media_MediaListResponse:
    properties:
      data:
        $ref: '#/definitions/go-boilerplate_internal_dto_media.MediaListResponse'
      meta:
        $ref: '#/definitions/go-boilerplate_pkg_response.Meta'
      request_id:
        type: string
      success:
        type: boolean
    type: object
  go-boilerplate_pkg_response.Response-go-boilerplate_internal_dto_media_MediaResponse:
    properties:
      data:
        $ref: '#/definitions/go-boilerplate_internal_dto_media.MediaResponse'
      meta:
        $ref: '#/definitions/go-boilerplate_pkg_response.Meta'
      request_id:
        type: string
      success:
        type: boolean
    type: object
  go-boilerplate_pkg_response.Response-go-boilerplate_internal_dto_media_PresignedURLResponse:
    properties:
      data:
        $ref: '#/definitions/go-boilerplate_internal_dto_media.PresignedURLResponse'
      meta:
        $ref: '#/definitions/go-boilerplate_pkg_response.Meta'
      request_id:
        type: string
      success:
        type: boolean
    type: object
  go-boilerplate_pkg_response.Response-go-boilerplate_internal_dto_translation_TranslationResponse:
    properties:
      data:
        $ref: '#/definitions/go-boilerplate_internal_dto_translation.TranslationResponse'
      meta:
        $ref: '#/definitions/go-boilerplate_pkg_response.Meta'
      request_id:
        type: string
      success:
        type: boolean
    type: object
  go-boilerplate_pkg_response.Response-internal_handlers_http_v1_config_ConfigResponse:
    properties:
      data:
        $ref: '#/definitions/internal_handlers_http_v1_config.ConfigResponse'
      meta:
        $ref: '#/definitions/go-boilerplate_pkg_response.Meta'
      request_id:
        type: string
      success:
        type: boolean
    type: object
  go-boilerplate_pkg_response.Response-map_string_string:
    properties:
      data:
        $ref: '#/definitions/map_string_string'
      meta:
        $ref: '#/definitions/go-boilerplate_pkg_response.Meta'
      request_id:
        type: string
      success:
        type: boolean
    type: object
  internal_handlers_http_v1_config.AppConfig:
    properties:
      env:
        type: string
      name:
        type: string
      version:
        type: string
    type: object
  internal_handlers_http_v1_config.AsynqConfig:
    properties:
      concurrency:
        type: integer
      job_timeout:
        type: string
    type: object
  internal_handlers_http_v1_config.CORSConfig:
    properties:
      allow_credentials:
        type: boolean
      allow_headers:
        type: string
      allow_methods:
        type: string
      allow_origins:
        type: string
      max_age:
        type: integer
    type: object
  internal_handlers_http_v1_config.ConfigResponse:
    properties:
      app:
        $ref: '#/definitions/internal_handlers_http_v1_config.AppConfig'
      asynq:
        $ref: '#/definitions/internal_handlers_http_v1_config.AsynqConfig'
      cached_at:
        type: string
      cors:
        $ref: '#/definitions/internal_handlers_http_v1_config.CORSConfig'
      email:
        $ref: '#/definitions/internal_handlers_http_v1_config.EmailConfig'
      http:
        $ref: '#/definitions/internal_handlers_http_v1_config.HTTPConfig'
      jwt:
        $ref: '#/definitions/internal_handlers_http_v1_config.JWTConfig'
      log:
        $ref: '#/definitions/internal_handlers_http_v1_config.LogConfig'
      metrics:
        $ref: '#/definitions/internal_handlers_http_v1_config.MetricsConfig'
      postgres:
        $ref: '#/definitions/internal_handlers_http_v1_config.PostgresConfig'
      rate_limit:
        $ref: '#/definitions/internal_handlers_http_v1_config.RateLimitConfig'
      redis:
        $ref: '#/definitions/internal_handlers_http_v1_config.RedisConfig'
      swagger:
        $ref: '#/definitions/internal_handlers_http_v1_config.SwaggerConfig'
    type: object
  internal_handlers_http_v1_config.EmailConfig:
    properties:
      api_key:
        description: Masked
        type: string
      from_email:
        type: string
      from_name:
        type: string
      provider:
        type: string
    type: object
  internal_handlers_http_v1_config.HTTPConfig:
    properties:
      idle_timeout:
        type: string
      port:
        type: string
      request_timeout:
        type: string
      timeout:
        type: string
