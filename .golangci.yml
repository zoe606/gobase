version: "2"

linters:
  default: none
  enable:
    # Essential linters
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - bodyclose
    - noctx
    - sqlclosecheck
    - rowserrcheck

    # Security
    - gosec

    # Error handling
    - errorlint

    # Code quality
    - gocritic
    - unconvert
    - unparam
    - misspell
    - asciicheck
    - dogsled
    - durationcheck
    - exhaustive
    - copyloopvar
    - makezero
    - predeclared
    - whitespace

    # Style (less strict)
    - revive
    - godot

    # Complexity
    - cyclop
    - gocognit
    - nestif

    # Imports
    - gochecknoinits

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false  # Allow _ = for intentional ignores
    errorlint:
      errorf: true
    exhaustive:
      default-signifies-exhaustive: true
    gocognit:
      min-complexity: 20
    gocritic:
      disabled-checks:
        - dupImport
        - unnecessaryBlock
        - hugeParam  # Too strict for DTOs
      enabled-tags:
        - diagnostic
        - performance
        - style
    cyclop:
      max-complexity: 15
    misspell:
      locale: US
    nestif:
      min-complexity: 5
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: var-declaration
        - name: var-naming

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Exclude tests from some linters
      - linters:
          - errcheck
          - gosec
        path: _test\.go$
      # Exclude integration tests
      - linters:
          - godot
          - gochecknoinits
        path: integration-test
      # Exclude internal from godot
      - linters:
          - godot
        path: internal
      # Allow longer functions in tests
      - linters:
          - gocognit
          - cyclop
        path: _test\.go$
      # pkg/json is intentionally named to match stdlib for drop-in replacement
      - linters:
          - revive
        path: pkg/json/
    paths:
      - bin/
      - third_party$
      - builtin$
      - examples$
      - docs/

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - bin/
      - third_party$
      - builtin$
      - examples$
      - docs/
