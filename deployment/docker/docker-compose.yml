# Base services: Database, Redis, and MinIO
# Used by both air users and docker users
services:
  db:
    container_name: ${APP_NAME:-go-boilerplate}-db
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DBNAME:-app}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  redis:
    container_name: ${APP_NAME:-go-boilerplate}-redis
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  minio:
    container_name: ${APP_NAME:-go-boilerplate}-minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_S3_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  asynqmon:
    container_name: ${APP_NAME:-go-boilerplate}-asynqmon
    image: hibiken/asynqmon:latest
    ports:
      - "${ASYNQMON_PORT:-8081}:8080"
    command:
      - --redis-addr=redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_network
    profiles:
      - monitoring

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
  redis_data:
  minio_data:
