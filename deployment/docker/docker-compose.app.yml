# App and Worker services
# Usage: docker compose -f docker-compose.yml -f docker-compose.app.yml up
services:
  app:
    container_name: ${APP_NAME:-go-boilerplate}-app
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      args:
        TARGET: app
    env_file:
      - ../../.env
    environment:
      # Override hosts to use Docker network names
      POSTGRES_HOST: db
      REDIS_HOST: redis
      STORAGE_S3_ENDPOINT: minio:9000
    ports:
      - "${HTTP_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app_network
    volumes:
      - ../../config:/config:ro

  worker:
    container_name: ${APP_NAME:-go-boilerplate}-worker
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      args:
        TARGET: worker
    env_file:
      - ../../.env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      STORAGE_S3_ENDPOINT: minio:9000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app_network
    volumes:
      - ../../config:/config:ro
    restart: unless-stopped

networks:
  app_network:

volumes:
  db_data:
  redis_data:
